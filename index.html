<!-- ================= MOBİL DÜZEN (<768px) ============== -->

<div id="mobile">


  <!-- Bej bant: satırlar + kategoriler -->
  <section class="m-band">


    <div class="m-slogan rv rv-up">
      <span>Kendi düzenini kur</span>
      <span>sınırları genişlet!</span>
    </div>
    <div class="m-redline-wrap">
      <div class="m-redline rv rv-line"></div>
      <svg class="m-mark" viewBox="919.45 1112.64 81.1 40.55">
        <path fill="#ff5239" d="M919.45,1132.92v5.07h32.95c1.4,0,2.53,1.13,2.53,2.53v12.67h5.07v-15.21c0-2.8-2.27-5.07-5.07-5.07h-35.48Z"/>

    <span class="m-num c-light m-desk-num">04</span>
    <span class="m-desk-title c-red">Süreç</span>
  </section>

  <!-- Süreç: 2'li kolon, 6. hücre = İletişime Geçin -->

    <div class="m-strip">
      <div class="m-step rv rv-pop">
        <div class="m-circle"><img src="img/metal.jpg" alt="" style="transform:scaleX(-1);"></div>
        <div class="m-step-label"><span>Metal Şekillendirme</span></div>
      </div>
      <div class="m-step rv rv-pop d1">
        <div class="m-circle"><img src="img/wood.jpg" alt=""></div>
        <div class="m-step-label"><span>Ahşap İşleme</span></div>
      </div>
      <div class="m-step rv rv-pop d2">
        <div class="m-circle m-circle-brand">
          <svg viewBox="883.25 1887.16 153.5 101.74">
            <path fill="#333132" d="M883.25,1938.03v12.72h57.67c3.51,0,6.36,2.85,6.36,6.36v31.79h12.72v-38.15c0-7.02-5.69-12.72-12.72-12.72h-64.03Z"/>

      </div>

        <div class="m-circle"><img src="img/truck.jpg" alt=""></div>
        <div class="m-step-label"><span>Teslimat</span></div>
      </div>

      <a class="m-contact rv rv-up" data-link="iletisim" href="#" target="_top">İletişime Geçin</a>
    </div>
  </section>
